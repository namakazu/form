<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>家計簿レポート</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif;background:#f6f7f9;min-height:100vh;overflow-y:scroll}
    .wrap{max-width:480px;margin:0 auto;padding:16px 12px 40px}
    h1{font-size:17px;font-weight:600;margin-bottom:16px;color:#1a1a1a}
    .tabs{display:flex;margin-bottom:16px;border-radius:10px;overflow:hidden;border:1.5px solid #e0e0e0;background:#fff}
    .tab{flex:1;padding:10px;text-align:center;font-size:14px;cursor:pointer;color:#888;background:#fff;border:none}
    .tab.active{background:#2a73ff;color:#fff;font-weight:600}
    .card{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;border:0.5px solid #e0e0e0}
    .card-title{font-size:13px;font-weight:500;color:#555;margin-bottom:12px}

    /* 残額ボックス */
    .balance-box{border-radius:12px;padding:16px;margin-bottom:16px;background:linear-gradient(135deg,#1a5fd8,#2a73ff);color:#fff}
    .balance-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    .balance-label{font-size:12px;opacity:0.8}
    .balance-amount{font-size:28px;font-weight:700;margin-top:2px}
    .balance-perday{font-size:13px;opacity:0.85;margin-top:4px}
    .balance-detail{display:flex;gap:16px;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.2)}
    .balance-detail-item{flex:1}
    .balance-detail-label{font-size:11px;opacity:0.75;margin-bottom:2px}
    .balance-detail-value{font-size:13px;font-weight:600}

    /* 収支サマリ */
    .summary-box{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;border:0.5px solid #e0e0e0}
    .summary-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid #f0f0f0}
    .summary-row:last-child{border-bottom:none;padding-top:10px;margin-top:4px}
    .summary-label{font-size:13px;color:#555}
    .summary-amount{font-size:15px;font-weight:600}
    .summary-sub{font-size:11px;color:#888;margin-top:2px}
    .income-color{color:#00a86b}
    .expense-color{color:#2a73ff}
    .balance-plus{color:#00a86b;font-size:17px;font-weight:700}
    .balance-minus{color:#b00020;font-size:17px;font-weight:700}
    .summary-divider{border:none;border-top:1.5px solid #e0e0e0;margin:4px 0}

    /* グラフ */
    .total-box{background:#2a73ff;border-radius:12px;padding:16px;margin-bottom:16px;color:#fff}
    .total-label{font-size:12px;opacity:0.8;margin-bottom:4px}
    .total-amount{font-size:28px;font-weight:600}
    .total-sub{font-size:12px;opacity:0.7;margin-top:4px}
    .month-selector{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
    .month-btn{padding:6px 14px;border:1.5px solid #e0e0e0;border-radius:20px;background:#fff;font-size:13px;cursor:pointer;white-space:nowrap;color:#555;flex-shrink:0}
    .month-btn.active{border-color:#2a73ff;background:#eef3ff;color:#2a73ff;font-weight:600}
    .cat-list{margin-top:8px}
    .cat-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid #f0f0f0}
    .cat-item:last-child{border-bottom:none}
    .cat-bar-wrap{flex:1;background:#f0f0f0;border-radius:4px;height:6px;overflow:hidden;min-width:0}
    .cat-bar{height:6px;border-radius:4px;transition:width 0.5s}
    .cat-name{font-size:12px;color:#333;width:90px;flex-shrink:0}
    .cat-amount{font-size:12px;font-weight:500;color:#333;width:65px;text-align:right;flex-shrink:0}
    .chart-wrap{position:relative;height:220px;margin:8px 0}
    .trend-wrap{position:relative;height:200px;margin:8px 0}

    /* カレンダー */
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:4px}
    .cal-header{text-align:center;font-size:11px;color:#888;padding:5px 0;font-weight:600}
    .cal-header.sun{color:#e53935}
    .cal-header.sat{color:#1e88e5}
    .cal-cell{background:#fafafa;border-radius:6px;padding:5px 3px;min-height:50px;border:0.5px solid #efefef;text-align:center}
    .cal-cell.empty{background:transparent;border-color:transparent}
    /* ここから変更：支出ありセルはタップ可能に、色は誰が使ったかで分ける */
    .cal-cell.has-expense{cursor:pointer}
    .cal-cell.has-expense:active{opacity:0.75}
    /* 夫のみ→青、妻のみ→ピンク、両方→左右で色分け */
    .cal-cell.kazu-only{background:#eef3ff;border-color:#c7d9ff}
    .cal-cell.momo-only{background:#fff0f5;border-color:#ffc8dc}
    .cal-cell.both-spent{background:linear-gradient(to right,#eef3ff 50%,#fff0f5 50%);border-color:#d8c0f0}
    .cal-amount.kazu-color{color:#2a73ff}
    .cal-amount.momo-color{color:#d4537e}
    .cal-amount.both-color{color:#555;font-weight:700}
    /* ここまで変更 */

    /* ここから追加：グラフタブの人物フィルターボタン */
    .person-filter{display:flex;gap:6px;margin-bottom:14px}
    .person-btn{flex:1;padding:7px 0;border:1.5px solid #e0e0e0;border-radius:8px;background:#fff;font-size:12px;cursor:pointer;color:#888;font-weight:500}
    .person-btn.pf-all{border-color:#555;background:#555;color:#fff}
    .person-btn.pf-kazu{border-color:#2a73ff;background:#2a73ff;color:#fff}
    .person-btn.pf-momo{border-color:#d4537e;background:#d4537e;color:#fff}
    /* ここまで追加 */
    .cal-cell.today{border:2px solid #2a73ff}

    /* ここから追加：日別詳細モーダル */
    .day-modal{background:#fff;border-radius:16px;padding:20px;width:90%;max-width:400px;max-height:80vh;display:flex;flex-direction:column}
    .day-modal-body{overflow-y:auto;flex:1;margin:12px 0}
    .day-detail-item{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:0.5px solid #f0f0f0}
    .day-detail-item:last-child{border-bottom:none}
    .day-detail-cat{flex:1;font-size:13px;color:#333;min-width:0}
    .day-detail-cat-name{font-weight:500}
    .day-detail-memo{font-size:11px;color:#888;margin-top:2px}
    .day-detail-amount{font-size:14px;font-weight:600;color:#2a73ff;white-space:nowrap}
    .day-detail-total{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1.5px solid #e0e0e0;margin-top:4px}
    .day-detail-total-label{font-size:13px;font-weight:600;color:#333}
    .day-detail-total-amount{font-size:17px;font-weight:700;color:#2a73ff}
    /* ここまで追加 */
    .cal-day{font-size:11px;color:#444;margin-bottom:3px;font-weight:500}
    .cal-day.sun{color:#e53935}
    .cal-day.sat{color:#1e88e5}
    .cal-amount{font-size:10px;color:#2a73ff;font-weight:600;line-height:1.4;word-break:break-all}

    /* 履歴 */
    .history-item{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:8px;border:0.5px solid #e0e0e0}
    .history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
    .history-cat{font-size:13px;font-weight:500;color:#333}
    .history-amount{font-size:15px;font-weight:600;color:#2a73ff;white-space:nowrap;margin-left:8px}
    .history-amount.income{color:#00a86b}
    .history-meta{font-size:12px;color:#888;margin-top:2px}
    .history-who{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;margin-top:6px}
    .who-kazu{background:#eef3ff;color:#2a73ff}
    .who-wife{background:#fff0f5;color:#d4537e}
    .history-actions{display:flex;gap:6px;margin-top:8px}
    .btn-edit{padding:5px 14px;border:1.5px solid #2a73ff;border-radius:6px;background:#fff;color:#2a73ff;font-size:12px;cursor:pointer;font-weight:500}
    .btn-delete{padding:5px 14px;border:1.5px solid #ffcccc;border-radius:6px;background:#fff;color:#b00020;font-size:12px;cursor:pointer}

    /* モーダル */
    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:100}
    .modal-overlay.show{display:flex}
    .modal{background:#fff;border-radius:16px;padding:20px;width:90%;max-width:400px}
    .modal-title{font-size:16px;font-weight:600;margin-bottom:16px}
    .modal-field{margin-bottom:12px}
    .modal-field label{display:block;font-size:12px;color:#888;margin-bottom:4px}
    .modal-field input,.modal-field select{width:100%;padding:10px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:15px;background:#fff}
    .modal-field input:focus,.modal-field select:focus{outline:none;border-color:#2a73ff}
    /* ここから追加：日付inputのネイティブスタイルを除去してwidth:100%を確実に効かせる */
    .modal-field input[type="date"]{-webkit-appearance:none;appearance:none}
    /* ここまで追加 */
    .modal-actions{display:flex;gap:8px;margin-top:16px}
    .btn-save{flex:1;padding:12px;border:none;border-radius:8px;background:#2a73ff;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
    .btn-cancel{flex:1;padding:12px;border:1.5px solid #e0e0e0;border-radius:8px;background:#fff;color:#555;font-size:15px;cursor:pointer}

    .loading{text-align:center;padding:40px;color:#888;font-size:14px}
    .error{text-align:center;padding:40px;color:#b00020;font-size:13px}
    .hidden{display:none}
  </style>
</head>
<body>
<div class="wrap">
  <h1>📊 家計簿レポート</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('graph')">📊 グラフ</button>
    <button class="tab" onclick="switchTab('calendar')">📅 カレンダー</button>
    <button class="tab" onclick="switchTab('history')">📋 履歴</button>
  </div>

  <!-- ここから追加：月選択を全タブ共通のエリアに移動 -->
  <div class="month-selector" id="monthSelector"></div>
  <!-- ここまで追加 -->

  <div id="graphTab">
    <div id="graphContent"><div class="loading">読み込み中...</div></div>
  </div>

  <!-- ここから追加：カレンダータブ -->
  <div id="calendarTab" class="hidden">
    <div id="calendarContent"><div class="loading">読み込み中...</div></div>
  </div>
  <!-- ここまで追加 -->

  <div id="historyTab" class="hidden">
    <div id="historyContent"><div class="loading">読み込み中...</div></div>
  </div>
</div>

<!-- ここから追加：日別詳細モーダル -->
<div class="modal-overlay" id="dayDetailModal" onclick="closeDayDetail()">
  <div class="day-modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="dayDetailTitle"></div>
    <div class="day-modal-body" id="dayDetailBody"></div>
    <button class="btn-cancel" onclick="closeDayDetail()">閉じる</button>
  </div>
</div>
<!-- ここまで追加 -->

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">✏️ 記録を編集</div>
    <div class="modal-field"><label>日付</label><input type="date" id="editDate"></div>
    <div class="modal-field">
      <label>カテゴリ</label>
      <select id="editCategory">
        <option>食費</option><option>外食</option><option>食費・日用品</option>
        <option>交通</option><option>交際</option><option>交際費</option>
        <option>日用品</option><option>娯楽</option><option>光熱費・通信費</option>
        <option>収入</option><option>その他</option>
      </select>
    </div>
    <div class="modal-field"><label>金額</label><input type="number" id="editAmount" inputmode="numeric"></div>
    <div class="modal-field"><label>メモ</label><input type="text" id="editMemo" placeholder="メモ（任意）"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveEdit()">保存する</button>
    </div>
  </div>
</div>

<script>
const GAS_URL  = 'https://script.google.com/macros/s/AKfycbzrfL8YFHZFjBvyaliUkgkJnQ_ojoKd5D0CKKQD66PAdpvSsGaC5p1SVj-6kpHs2jB6bA/exec';
const MY_UID   = 'U4bf411c6055637faa51b6b3fce78c492';
const WIFE_UID = 'U19a984a3d7ca40f383f66393f8dae40d';

const CAT_COLORS = {
  '食費':'#FF6384','食費・日用品':'#FF6384','外食':'#FF6384',
  '交通':'#36A2EB','交際':'#FFCE56','交際費':'#FFCE56',
  '日用品':'#4BC0C0','娯楽':'#9966FF','光熱費・通信費':'#FF9F40','その他':'#C9CBCF'
};
const CAT_EMOJI = {
  '食費':'🍜','食費・日用品':'🛒','外食':'🍜','交通':'🚃',
  '交際':'🥂','交際費':'🥂','日用品':'🛒','娯楽':'🎉',
  '光熱費・通信費':'💡','収入':'💰','その他':'📦'
};

let allData = [];
let balanceData = null;
let selectedMonth = '';
// ここから追加：グラフタブの人物フィルター（'all' / 'kazu' / 'momo'）
let selectedPerson = 'all';
// ここまで追加
let pieChart = null;
let barChart = null;
let editingRowIndex = null;

// ここから変更：Date.now()だと並列呼び出し時に名前が衝突するため連番カウンターに変更
let _jsonpSeq = 0;
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + (++_jsonpSeq);
    window[cb] = (data) => { resolve(data); delete window[cb]; };
    const s = document.createElement('script');
    s.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}
// ここまで変更

async function loadData() {
  try {
    // ここから変更：2つのAPIを並列取得し、両方揃ってから1回だけ描画する
    const [reportResult, balanceResult] = await Promise.allSettled([
      jsonp(GAS_URL + '?action=getReport'),
      jsonp(GAS_URL + '?action=getBalance')
    ]);

    if (reportResult.status === 'fulfilled') {
      allData = reportResult.value.data || [];
    } else {
      throw reportResult.reason; // レポート取得失敗は致命的エラーとして扱う
    }

    // 残額は取得できなくてもグラフ表示は継続（balanceDataはnullのまま）
    if (balanceResult.status === 'fulfilled') {
      balanceData = balanceResult.value;
    }

    // 両方揃った状態で1回だけ描画
    setupMonths();
    renderHistory();
    // ここまで変更
  } catch(e) {
    document.getElementById('graphContent').innerHTML = '<div class="error">データの読み込みに失敗しました。</div>';
    document.getElementById('historyContent').innerHTML = '<div class="error">データの読み込みに失敗しました。</div>';
  }
}

// ここから変更：カレンダータブを含む3タブ切り替え
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active',
      (i === 0 && tab === 'graph') ||
      (i === 1 && tab === 'calendar') ||
      (i === 2 && tab === 'history')
    );
  });
  document.getElementById('graphTab').classList.toggle('hidden', tab !== 'graph');
  document.getElementById('calendarTab').classList.toggle('hidden', tab !== 'calendar');
  document.getElementById('historyTab').classList.toggle('hidden', tab !== 'history');
  // カレンダータブに切り替えたときに描画
  if (tab === 'calendar') renderCalendar();
}
// ここまで変更

function setupMonths() {
  const months = [...new Set(allData.map(r => r.month))].sort().reverse().slice(0, 6);
  selectedMonth = months[0] || '';
  // 月選択ボタンを共通エリアに描画（グラフ・カレンダー両方に反映）
  document.getElementById('monthSelector').innerHTML = months.map(m =>
    `<button class="month-btn ${m === selectedMonth ? 'active' : ''}" onclick="selectMonth('${m}')">${m.replace('/', '年')}月</button>`
  ).join('');
  renderGraph();
}

function selectMonth(m) {
  selectedMonth = m;
  document.querySelectorAll('.month-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === m.replace('/', '年') + '月');
  });
  renderGraph();
  // カレンダータブが表示中なら再描画
  if (!document.getElementById('calendarTab').classList.contains('hidden')) {
    renderCalendar();
  }
}

// ここから追加：グラフタブの人物フィルター切り替え
function setPersonFilter(p) {
  selectedPerson = p;
  renderGraph();
}
// ここまで追加

function renderGraph() {
  const incomeRows  = allData.filter(r => r.month === selectedMonth && r.category === '収入');
  // ここから変更：selectedPersonに応じて支出データを絞り込む
  const expenseRows = allData.filter(r => {
    if (r.month !== selectedMonth || r.amount <= 0 || r.category === '収入') return false;
    if (selectedPerson === 'kazu') return r.uid === MY_UID;
    if (selectedPerson === 'momo') return r.uid === WIFE_UID;
    return true; // 'all'
  });
  // ここまで変更
  const totalIncome  = incomeRows.reduce((s, r) => s + Math.abs(r.amount), 0);
  const totalExpense = expenseRows.reduce((s, r) => s + r.amount, 0);
  const balance      = totalIncome - totalExpense;
  const balanceSign  = balance >= 0 ? '' : '-';
  const balanceClass = balance >= 0 ? 'balance-plus' : 'balance-minus';

  // 残額ボックス（今月選択時のみ詳細表示）
  const now = new Date();
  const currentMonth = `${now.getFullYear()}/${('0'+(now.getMonth()+1)).slice(-2)}`;
  const isCurrentMonth = selectedMonth === currentMonth;

  let balanceBoxHtml = '';
  if (isCurrentMonth && balanceData) {
    const b = balanceData;
    const perDaySign = b.perDay >= 0 ? '' : '-';
    balanceBoxHtml = `
    <div class="balance-box">
      <div class="balance-top">
        <div>
          <div class="balance-label">今月の残額</div>
          <div class="balance-amount">${balanceSign}¥${Math.abs(b.balance).toLocaleString()}</div>
          <div class="balance-perday">残り${b.diffDays}日 → ${perDaySign}¥${Math.abs(b.perDay).toLocaleString()}/日</div>
        </div>
      </div>
      <div class="balance-detail">
        <div class="balance-detail-item">
          <div class="balance-detail-label">👤 夫の支出</div>
          <div class="balance-detail-value">¥${b.kazuExpense.toLocaleString()}</div>
        </div>
        <div class="balance-detail-item">
          <div class="balance-detail-label">👤 妻の支出</div>
          <div class="balance-detail-value">¥${b.momoExpense.toLocaleString()}</div>
        </div>
      </div>
    </div>`;
  }

  const cats = {};
  expenseRows.forEach(r => { cats[r.category] = (cats[r.category] || 0) + r.amount; });
  const sorted = Object.entries(cats).sort((a, b) => b[1] - a[1]);
  const trendData = buildTrend();

  // ここから追加：人物フィルターボタン（グラフエリアの上部に表示）
  const pfAll  = selectedPerson === 'all'  ? 'person-btn pf-all'  : 'person-btn';
  const pfKazu = selectedPerson === 'kazu' ? 'person-btn pf-kazu' : 'person-btn';
  const pfMomo = selectedPerson === 'momo' ? 'person-btn pf-momo' : 'person-btn';
  const personFilterHtml = `
    <div class="person-filter">
      <button class="${pfAll}"  onclick="setPersonFilter('all')">👥 全員</button>
      <button class="${pfKazu}" onclick="setPersonFilter('kazu')">👤 夫</button>
      <button class="${pfMomo}" onclick="setPersonFilter('momo')">👤 妻</button>
    </div>`;
  // ここまで追加

  document.getElementById('graphContent').innerHTML = `
    ${personFilterHtml}
    ${balanceBoxHtml}

    <div class="summary-box">
      <div class="summary-row">
        <div>
          <div class="summary-label">💰 収入</div>
        </div>
        <span class="summary-amount income-color">¥${totalIncome.toLocaleString()}</span>
      </div>
      <div class="summary-row">
        <div>
          <div class="summary-label">💴 支出</div>
        </div>
        <span class="summary-amount expense-color">¥${totalExpense.toLocaleString()}</span>
      </div>
      <hr class="summary-divider">
      <div class="summary-row">
        <span class="summary-label" style="font-weight:600">収支</span>
        <span class="${balanceClass}">${balanceSign}¥${Math.abs(balance).toLocaleString()}</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">カテゴリ別内訳（支出）</div>
      <div class="chart-wrap"><canvas id="pieChart"></canvas></div>
      <div class="cat-list">
        ${sorted.map(([cat, amt]) => {
          const pct = totalExpense > 0 ? Math.round(amt / totalExpense * 100) : 0;
          const color = CAT_COLORS[cat] || '#C9CBCF';
          const emoji = CAT_EMOJI[cat] || '📌';
          return `<div class="cat-item">
            <span class="cat-name">${emoji} ${cat}</span>
            <div class="cat-bar-wrap"><div class="cat-bar" style="width:${pct}%;background:${color}"></div></div>
            <span class="cat-amount">¥${amt.toLocaleString()}</span>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="card">
      <div class="card-title">月別支出推移</div>
      <div class="trend-wrap"><canvas id="barChart"></canvas></div>
    </div>
  `;

  if (pieChart) pieChart.destroy();
  pieChart = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: { labels: sorted.map(([cat]) => cat), datasets: [{ data: sorted.map(([,amt]) => amt), backgroundColor: sorted.map(([cat]) => CAT_COLORS[cat] || '#C9CBCF'), borderWidth: 2, borderColor: '#fff' }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });

  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: { labels: trendData.map(d => d.month.replace('2026/', '')), datasets: [{ data: trendData.map(d => d.total), backgroundColor: trendData.map(d => d.month === selectedMonth ? '#2a73ff' : '#B0C4F8'), borderRadius: 6 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: v => '¥' + v.toLocaleString(), font: { size: 10 } } }, x: { ticks: { font: { size: 10 } } } } }
  });
}

function buildTrend() {
  const months = [...new Set(allData.map(r => r.month))].sort().slice(-6);
  return months.map(m => ({
    month: m,
    total: allData.filter(r => r.month === m && r.amount > 0 && r.category !== '収入').reduce((s, r) => s + r.amount, 0)
  }));
}

// ここから追加：カレンダー描画関数
function renderCalendar() {
  if (!selectedMonth) return;

  // 年・月を数値で取得（例: "2026/04" → year=2026, month=4）
  const [year, month] = selectedMonth.split('/').map(Number);

  // ここから変更：夫・妻それぞれの日別合計を別々に集計
  const dayKazu = {};  // 夫の日別合計
  const dayMomo = {};  // 妻の日別合計
  allData
    .filter(r => r.month === selectedMonth && r.amount > 0 && r.category !== '収入')
    .forEach(r => {
      // 日付文字列から「日」部分を取得（"2026/04/15" → 15）
      const day = parseInt(r.date.split('/')[2]);
      if (r.uid === MY_UID)   dayKazu[day] = (dayKazu[day] || 0) + r.amount;
      if (r.uid === WIFE_UID) dayMomo[day] = (dayMomo[day] || 0) + r.amount;
    });
  // ここまで変更

  // カレンダーの計算
  const firstDayOfWeek = new Date(year, month - 1, 1).getDay(); // 月初の曜日（0=日）
  const lastDate = new Date(year, month, 0).getDate(); // 月末の日

  // 今日の日付文字列を作成（今日セルを強調するため）
  const now = new Date();
  const todayStr = `${now.getFullYear()}/${('0'+(now.getMonth()+1)).slice(-2)}/${('0'+now.getDate()).slice(-2)}`;

  // 曜日ヘッダー
  const headers = ['日','月','火','水','木','金','土'];
  const headerHtml = headers.map((h, i) =>
    `<div class="cal-header ${i===0?'sun':i===6?'sat':''}">${h}</div>`
  ).join('');

  // 空白セル（月初の曜日分）＋日付セル
  const cells = [];

  // 月初前の空白セルを埋める
  for (let i = 0; i < firstDayOfWeek; i++) {
    cells.push('<div class="cal-cell empty"></div>');
  }

  // 各日のセルを生成
  for (let d = 1; d <= lastDate; d++) {
    const dayOfWeek = (firstDayOfWeek + d - 1) % 7; // 0=日, 6=土
    const dateStr = `${year}/${('0'+month).slice(-2)}/${('0'+d).slice(-2)}`;
    // ここから変更：夫・妻それぞれの金額を取得して色クラスを決定
    const kAmt = dayKazu[d] || 0;
    const mAmt = dayMomo[d] || 0;
    const amount = kAmt + mAmt;  // その日の合計
    const isToday = dateStr === todayStr;
    const hasExpense = amount > 0;

    const classes = ['cal-cell'];
    if (hasExpense) {
      classes.push('has-expense');
      // 誰が使ったかによってセルの色クラスを追加
      if (kAmt > 0 && mAmt > 0) classes.push('both-spent');
      else if (kAmt > 0)        classes.push('kazu-only');
      else                      classes.push('momo-only');
    }
    if (isToday) classes.push('today');

    // 曜日ごとに色を変える
    const dayClass = dayOfWeek === 0 ? 'sun' : dayOfWeek === 6 ? 'sat' : '';

    // 金額テキストの色クラスも誰が使ったかで決定
    const amtColorClass = (kAmt > 0 && mAmt > 0) ? 'both-color' : kAmt > 0 ? 'kazu-color' : 'momo-color';

    // 金額表示：1万円以上は「12k」形式でスペースを節約
    const amountHtml = hasExpense
      ? `<div class="cal-amount ${amtColorClass}">${amount >= 10000 ? Math.floor(amount/1000)+'k' : '¥'+amount.toLocaleString()}</div>`
      : '';

    const clickAttr = hasExpense ? `onclick="openDayDetail('${dateStr}')"` : '';
    cells.push(`<div class="${classes.join(' ')}" ${clickAttr}>
      <div class="cal-day ${dayClass}">${d}</div>
      ${amountHtml}
    </div>`);
    // ここまで変更
  }

  document.getElementById('calendarContent').innerHTML = `
    <div class="card">
      <div class="card-title">${year}年${month}月 支出カレンダー</div>
      <div class="cal-grid">
        ${headerHtml}
        ${cells.join('')}
      </div>
    </div>
  `;
}
// ここまで追加

// ここから追加：日別詳細モーダルを開く
function openDayDetail(dateStr) {
  // 対象日の支出を取得（収入除外）
  const rows = allData.filter(r => r.date === dateStr && r.amount > 0 && r.category !== '収入');
  if (rows.length === 0) return;

  // 日付タイトル用に「4月15日」形式に変換
  const parts = dateStr.split('/');
  const titleDate = `${parseInt(parts[1])}月${parseInt(parts[2])}日の支出`;
  document.getElementById('dayDetailTitle').textContent = titleDate;

  // ここから変更：夫・妻それぞれの合計を計算（片方¥0でも必ず表示）
  const kazuTotal = rows.filter(r => r.uid === MY_UID).reduce((s, r) => s + r.amount, 0);
  const momoTotal = rows.filter(r => r.uid === WIFE_UID).reduce((s, r) => s + r.amount, 0);
  const dayTotal  = rows.reduce((s, r) => s + r.amount, 0);
  // ここまで変更

  // 各明細行を生成（金額の大きい順に並べる）
  const itemsHtml = [...rows]
    .sort((a, b) => b.amount - a.amount)
    .map(r => {
      const emoji = CAT_EMOJI[r.category] || '📌';
      // 誰の支出かを示すバッジ
      const whoHtml = r.uid === MY_UID
        ? '<span class="history-who who-kazu" style="font-size:10px;padding:1px 6px">夫</span>'
        : r.uid === WIFE_UID
        ? '<span class="history-who who-wife" style="font-size:10px;padding:1px 6px">妻</span>'
        : '';
      return `
      <div class="day-detail-item">
        <div class="day-detail-cat">
          <div class="day-detail-cat-name">${emoji} ${r.category} ${whoHtml}</div>
          ${r.memo ? `<div class="day-detail-memo">${r.memo}</div>` : ''}
        </div>
        <div class="day-detail-amount">¥${r.amount.toLocaleString()}</div>
      </div>`;
    }).join('');

  // ここから変更：夫・妻のサマリを常に表示（片方が¥0でも出す）
  const summaryHtml = `
    <div style="display:flex;gap:8px;margin-top:10px;margin-bottom:2px">
      <div style="flex:1;background:#eef3ff;border-radius:8px;padding:8px;text-align:center">
        <div style="font-size:11px;color:#2a73ff;margin-bottom:2px">👤 夫</div>
        <div style="font-size:13px;font-weight:600;color:#2a73ff">¥${kazuTotal.toLocaleString()}</div>
      </div>
      <div style="flex:1;background:#fff0f5;border-radius:8px;padding:8px;text-align:center">
        <div style="font-size:11px;color:#d4537e;margin-bottom:2px">👤 妻</div>
        <div style="font-size:13px;font-weight:600;color:#d4537e">¥${momoTotal.toLocaleString()}</div>
      </div>
    </div>`;
  // ここまで変更

  document.getElementById('dayDetailBody').innerHTML = `
    ${itemsHtml}
    ${summaryHtml}
    <div class="day-detail-total">
      <span class="day-detail-total-label">合計</span>
      <span class="day-detail-total-amount">¥${dayTotal.toLocaleString()}</span>
    </div>
  `;

  document.getElementById('dayDetailModal').classList.add('show');
}

// 日別詳細モーダルを閉じる
function closeDayDetail() {
  document.getElementById('dayDetailModal').classList.remove('show');
}
// ここまで追加

function renderHistory() {
  const sorted = [...allData].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 50);
  if (sorted.length === 0) { document.getElementById('historyContent').innerHTML = '<div class="loading">記録がありません</div>'; return; }

  document.getElementById('historyContent').innerHTML = sorted.map(r => {
    const isIncome = r.category === '収入';
    const emoji = CAT_EMOJI[r.category] || '📌';
    const whoLabel = r.uid === MY_UID ? '<span class="history-who who-kazu">👤 夫</span>' : r.uid === WIFE_UID ? '<span class="history-who who-wife">👤 妻</span>' : '';
    const memo = (r.memo || '').replace(/'/g, "\\'");
    const cat  = (r.category || '').replace(/'/g, "\\'");
    const displayAmount = Math.abs(r.amount);
    const amountClass = isIncome ? 'history-amount income' : 'history-amount';
    const amountSign = isIncome ? '+¥' : '¥';
    return `
    <div class="history-item" id="row-${r.rowIndex}">
      <div class="history-header">
        <span class="history-cat">${emoji} ${r.category}${r.memo && isIncome ? ' · ' + r.memo : ''}</span>
        <span class="${amountClass}">${amountSign}${displayAmount.toLocaleString()}</span>
      </div>
      <div class="history-meta">${r.date}${r.memo && !isIncome ? ' · ' + r.memo : ''}</div>
      ${whoLabel}
      <div class="history-actions">
        <button class="btn-edit" onclick="openEdit(${r.rowIndex}, '${r.date}', '${cat}', ${displayAmount}, '${memo}')">編集</button>
        <button class="btn-delete" onclick="deleteRecord(${r.rowIndex})">削除</button>
      </div>
    </div>`;
  }).join('');
}

function openEdit(rowIndex, date, category, amount, memo) {
  editingRowIndex = rowIndex;
  // スラッシュ区切り（2026/04/15）をハイフン区切り（2026-04-15）に変換してinput[type=date]に渡す
  document.getElementById('editDate').value = date.replace(/\//g, '-');
  document.getElementById('editCategory').value = category;
  document.getElementById('editAmount').value = amount;
  document.getElementById('editMemo').value = memo;
  document.getElementById('editModal').classList.add('show');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('show');
  editingRowIndex = null;
}

async function saveEdit() {
  if (!editingRowIndex) return;
  const dateStr  = document.getElementById('editDate').value;
  const category = document.getElementById('editCategory').value;
  const amount   = Number(document.getElementById('editAmount').value);
  const memo     = document.getElementById('editMemo').value;
  if (!dateStr || !category || amount <= 0) { alert('日付・カテゴリ・金額を正しく入力してください'); return; }

  await jsonp(GAS_URL + '?action=editRecord&rowIndex=' + editingRowIndex
    + '&dateStr=' + encodeURIComponent(dateStr)
    + '&category=' + encodeURIComponent(category)
    + '&amount=' + amount
    + '&memo=' + encodeURIComponent(memo));

  const idx = allData.findIndex(r => r.rowIndex === editingRowIndex);
  if (idx !== -1) allData[idx] = { ...allData[idx], date: dateStr, month: dateStr.slice(0, 7), category, amount, memo };

  closeModal();
  renderHistory();
  setupMonths();
  alert('✅ 保存しました！');
}

async function deleteRecord(rowIndex) {
  if (!confirm('この記録を削除しますか？')) return;
  await jsonp(GAS_URL + '?action=deleteRecord&rowIndex=' + rowIndex);
  allData = allData.filter(r => r.rowIndex !== rowIndex);
  renderHistory();
  setupMonths();
  alert('✅ 削除しました！');
}

loadData();
</script>
