<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>家計簿レポート</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif;background:#f6f7f9;min-height:100vh}
    .wrap{max-width:480px;margin:0 auto;padding:16px 12px 40px}
    h1{font-size:17px;font-weight:600;margin-bottom:16px;color:#1a1a1a}
    .tabs{display:flex;margin-bottom:16px;border-radius:10px;overflow:hidden;border:1.5px solid #e0e0e0;background:#fff}
    .tab{flex:1;padding:10px;text-align:center;font-size:14px;cursor:pointer;color:#888;background:#fff;border:none}
    .tab.active{background:#2a73ff;color:#fff;font-weight:600}
    .card{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;border:0.5px solid #e0e0e0}
    .card-title{font-size:13px;font-weight:500;color:#555;margin-bottom:12px}

    /* 収支サマリ */
    .summary-box{border-radius:12px;padding:16px;margin-bottom:16px;background:#fff;border:0.5px solid #e0e0e0}
    .summary-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid #f0f0f0}
    .summary-row:last-child{border-bottom:none;padding-top:10px;margin-top:4px}
    .summary-label{font-size:13px;color:#555}
    .summary-amount{font-size:15px;font-weight:600}
    .income-color{color:#00a86b}
    .expense-color{color:#2a73ff}
    .balance-plus{color:#00a86b;font-size:17px}
    .balance-minus{color:#b00020;font-size:17px}
    .summary-divider{border:none;border-top:1.5px solid #e0e0e0;margin:4px 0}

    /* グラフタブ */
    .total-box{background:#2a73ff;border-radius:12px;padding:16px;margin-bottom:16px;color:#fff}
    .total-label{font-size:12px;opacity:0.8;margin-bottom:4px}
    .total-amount{font-size:28px;font-weight:600}
    .total-sub{font-size:12px;opacity:0.7;margin-top:4px}
    .month-selector{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
    .month-btn{padding:6px 14px;border:1.5px solid #e0e0e0;border-radius:20px;background:#fff;font-size:13px;cursor:pointer;white-space:nowrap;color:#555;flex-shrink:0}
    .month-btn.active{border-color:#2a73ff;background:#eef3ff;color:#2a73ff;font-weight:600}
    .cat-list{margin-top:8px}
    .cat-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid #f0f0f0}
    .cat-item:last-child{border-bottom:none}
    .cat-bar-wrap{flex:1;background:#f0f0f0;border-radius:4px;height:6px;overflow:hidden;min-width:0}
    .cat-bar{height:6px;border-radius:4px;transition:width 0.5s}
    .cat-name{font-size:12px;color:#333;width:90px;flex-shrink:0}
    .cat-amount{font-size:12px;font-weight:500;color:#333;width:65px;text-align:right;flex-shrink:0}
    .chart-wrap{position:relative;height:220px;margin:8px 0}
    .trend-wrap{position:relative;height:200px;margin:8px 0}

    /* 履歴タブ */
    .history-item{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:8px;border:0.5px solid #e0e0e0}
    .history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
    .history-cat{font-size:13px;font-weight:500;color:#333}
    .history-amount{font-size:15px;font-weight:600;color:#2a73ff;white-space:nowrap;margin-left:8px}
    .history-amount.income{color:#00a86b}
    .history-meta{font-size:12px;color:#888;margin-top:2px}
    .history-who{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;margin-top:6px}
    .who-kazu{background:#eef3ff;color:#2a73ff}
    .who-wife{background:#fff0f5;color:#d4537e}
    .history-actions{display:flex;gap:6px;margin-top:8px}
    .btn-edit{padding:5px 14px;border:1.5px solid #2a73ff;border-radius:6px;background:#fff;color:#2a73ff;font-size:12px;cursor:pointer;font-weight:500}
    .btn-delete{padding:5px 14px;border:1.5px solid #ffcccc;border-radius:6px;background:#fff;color:#b00020;font-size:12px;cursor:pointer}

    /* 編集モーダル */
    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:100}
    .modal-overlay.show{display:flex}
    .modal{background:#fff;border-radius:16px;padding:20px;width:90%;max-width:400px}
    .modal-title{font-size:16px;font-weight:600;margin-bottom:16px}
    .modal-field{margin-bottom:12px}
    .modal-field label{display:block;font-size:12px;color:#888;margin-bottom:4px}
    .modal-field input,.modal-field select{width:100%;padding:10px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:15px;background:#fff}
    .modal-field input:focus,.modal-field select:focus{outline:none;border-color:#2a73ff}
    .modal-actions{display:flex;gap:8px;margin-top:16px}
    .btn-save{flex:1;padding:12px;border:none;border-radius:8px;background:#2a73ff;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
    .btn-cancel{flex:1;padding:12px;border:1.5px solid #e0e0e0;border-radius:8px;background:#fff;color:#555;font-size:15px;cursor:pointer}

    .loading{text-align:center;padding:40px;color:#888;font-size:14px}
    .error{text-align:center;padding:40px;color:#b00020;font-size:13px}
    .hidden{display:none}
  </style>
</head>
<body>
<div class="wrap">
  <h1>📊 家計簿レポート</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('graph')">📊 グラフ</button>
    <button class="tab" onclick="switchTab('history')">📋 履歴</button>
  </div>

  <div id="graphTab">
    <div class="month-selector" id="monthSelector"></div>
    <div id="graphContent"><div class="loading">読み込み中...</div></div>
  </div>

  <div id="historyTab" class="hidden">
    <div id="historyContent"><div class="loading">読み込み中...</div></div>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">✏️ 記録を編集</div>
    <div class="modal-field"><label>日付</label><input type="date" id="editDate"></div>
    <div class="modal-field">
      <label>カテゴリ</label>
      <select id="editCategory">
        <option>食費</option><option>外食</option><option>食費・日用品</option>
        <option>交通</option><option>交際</option><option>交際費</option>
        <option>日用品</option><option>娯楽</option><option>光熱費・通信費</option>
        <option>収入</option><option>その他</option>
      </select>
    </div>
    <div class="modal-field"><label>金額</label><input type="number" id="editAmount" inputmode="numeric"></div>
    <div class="modal-field"><label>メモ</label><input type="text" id="editMemo" placeholder="メモ（任意）"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveEdit()">保存する</button>
    </div>
  </div>
</div>

<script>
const GAS_URL  = 'https://script.google.com/macros/s/AKfycbzrfL8YFHZFjBvyaliUkgkJnQ_ojoKd5D0CKKQD66PAdpvSsGaC5p1SVj-6kpHs2jB6bA/exec';
const MY_UID   = 'U4bf411c6055637faa51b6b3fce78c492';
const WIFE_UID = 'U19a984a3d7ca40f383f66393f8dae40d';

const CAT_COLORS = {
  '食費':'#FF6384','食費・日用品':'#FF6384','外食':'#FF6384',
  '交通':'#36A2EB','交際':'#FFCE56','交際費':'#FFCE56',
  '日用品':'#4BC0C0','娯楽':'#9966FF','光熱費・通信費':'#FF9F40','その他':'#C9CBCF'
};
const CAT_EMOJI = {
  '食費':'🍜','食費・日用品':'🛒','外食':'🍜','交通':'🚃',
  '交際':'🥂','交際費':'🥂','日用品':'🛒','娯楽':'🎉',
  '光熱費・通信費':'💡','収入':'💰','その他':'📦'
};

let allData = [];
let selectedMonth = '';
let pieChart = null;
let barChart = null;
let editingRowIndex = null;

function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now();
    window[cb] = (data) => { resolve(data); delete window[cb]; };
    const s = document.createElement('script');
    s.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function loadData() {
  try {
    const json = await jsonp(GAS_URL + '?action=getReport');
    allData = json.data || [];
    setupMonths();
    renderHistory();
  } catch(e) {
    document.getElementById('graphContent').innerHTML = '<div class="error">データの読み込みに失敗しました。</div>';
    document.getElementById('historyContent').innerHTML = '<div class="error">データの読み込みに失敗しました。</div>';
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'graph') || (i === 1 && tab === 'history'));
  });
  document.getElementById('graphTab').classList.toggle('hidden', tab !== 'graph');
  document.getElementById('historyTab').classList.toggle('hidden', tab !== 'history');
}

function setupMonths() {
  const months = [...new Set(allData.map(r => r.month))].sort().reverse().slice(0, 6);
  selectedMonth = months[0] || '';
  document.getElementById('monthSelector').innerHTML = months.map(m =>
    `<button class="month-btn ${m === selectedMonth ? 'active' : ''}" onclick="selectMonth('${m}')">${m.replace('/', '年')}月</button>`
  ).join('');
  renderGraph();
}

function selectMonth(m) {
  selectedMonth = m;
  document.querySelectorAll('.month-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === m.replace('/', '年') + '月');
  });
  renderGraph();
}

function renderGraph() {
  // 収入・支出を分離
  const incomeRows  = allData.filter(r => r.month === selectedMonth && r.category === '収入');
  const expenseRows = allData.filter(r => r.month === selectedMonth && r.amount > 0 && r.category !== '収入');

  // 収入合計（マイナス値で保存されているので絶対値）
  const totalIncome  = incomeRows.reduce((s, r) => s + Math.abs(r.amount), 0);
  const totalExpense = expenseRows.reduce((s, r) => s + r.amount, 0);
  const balance      = totalIncome - totalExpense;
  const balanceClass = balance >= 0 ? 'balance-plus' : 'balance-minus';
  const balanceSign  = balance >= 0 ? '+' : '';

  // カテゴリ別集計（支出のみ）
  const cats = {};
  expenseRows.forEach(r => { cats[r.category] = (cats[r.category] || 0) + r.amount; });
  const sorted = Object.entries(cats).sort((a, b) => b[1] - a[1]);
  const trendData = buildTrend();

  document.getElementById('graphContent').innerHTML = `
    <!-- 収支サマリ -->
    <div class="summary-box">
      <div class="summary-row">
        <span class="summary-label">💰 収入</span>
        <span class="summary-amount income-color">¥${totalIncome.toLocaleString()}</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">💴 支出</span>
        <span class="summary-amount expense-color">¥${totalExpense.toLocaleString()}</span>
      </div>
      <hr class="summary-divider">
      <div class="summary-row">
        <span class="summary-label" style="font-weight:600">収支</span>
        <span class="${balanceClass}">${balanceSign}¥${balance.toLocaleString()}</span>
      </div>
    </div>

    <!-- 支出合計 -->
    <div class="total-box">
      <div class="total-label">今月の支出合計</div>
      <div class="total-amount">¥${totalExpense.toLocaleString()}</div>
      <div class="total-sub">${selectedMonth.replace('/', '年')}月</div>
    </div>

    <!-- カテゴリ別内訳 -->
    <div class="card">
      <div class="card-title">カテゴリ別内訳（支出）</div>
      <div class="chart-wrap"><canvas id="pieChart"></canvas></div>
      <div class="cat-list">
        ${sorted.map(([cat, amt]) => {
          const pct = totalExpense > 0 ? Math.round(amt / totalExpense * 100) : 0;
          const color = CAT_COLORS[cat] || '#C9CBCF';
          const emoji = CAT_EMOJI[cat] || '📌';
          return `<div class="cat-item">
            <span class="cat-name">${emoji} ${cat}</span>
            <div class="cat-bar-wrap"><div class="cat-bar" style="width:${pct}%;background:${color}"></div></div>
            <span class="cat-amount">¥${amt.toLocaleString()}</span>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- 月別推移 -->
    <div class="card">
      <div class="card-title">月別支出推移</div>
      <div class="trend-wrap"><canvas id="barChart"></canvas></div>
    </div>
  `;

  if (pieChart) pieChart.destroy();
  pieChart = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: { labels: sorted.map(([cat]) => cat), datasets: [{ data: sorted.map(([,amt]) => amt), backgroundColor: sorted.map(([cat]) => CAT_COLORS[cat] || '#C9CBCF'), borderWidth: 2, borderColor: '#fff' }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });

  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: { labels: trendData.map(d => d.month.replace('2026/', '')), datasets: [{ data: trendData.map(d => d.total), backgroundColor: trendData.map(d => d.month === selectedMonth ? '#2a73ff' : '#B0C4F8'), borderRadius: 6 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: v => '¥' + v.toLocaleString(), font: { size: 10 } } }, x: { ticks: { font: { size: 10 } } } } }
  });
}

function buildTrend() {
  const months = [...new Set(allData.map(r => r.month))].sort().slice(-6);
  return months.map(m => ({
    month: m,
    total: allData.filter(r => r.month === m && r.amount > 0 && r.category !== '収入').reduce((s, r) => s + r.amount, 0)
  }));
}

function renderHistory() {
  const sorted = [...allData].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 50);
  if (sorted.length === 0) { document.getElementById('historyContent').innerHTML = '<div class="loading">記録がありません</div>'; return; }

  document.getElementById('historyContent').innerHTML = sorted.map(r => {
    const isIncome = r.category === '収入';
    const emoji = CAT_EMOJI[r.category] || '📌';
    const whoLabel = r.uid === MY_UID ? '<span class="history-who who-kazu">👤 かず</span>' : r.uid === WIFE_UID ? '<span class="history-who who-wife">👤 もも</span>' : '';
    const memo = (r.memo || '').replace(/'/g, "\\'");
    const cat  = (r.category || '').replace(/'/g, "\\'");
    const displayAmount = isIncome ? Math.abs(r.amount) : r.amount;
    const amountClass = isIncome ? 'history-amount income' : 'history-amount';
    const amountSign = isIncome ? '+¥' : '¥';
    return `
    <div class="history-item" id="row-${r.rowIndex}">
      <div class="history-header">
        <span class="history-cat">${emoji} ${r.category}${r.memo && isIncome ? ' · ' + r.memo : ''}</span>
        <span class="${amountClass}">${amountSign}${displayAmount.toLocaleString()}</span>
      </div>
      <div class="history-meta">${r.date}${r.memo && !isIncome ? ' · ' + r.memo : ''}</div>
      ${whoLabel}
      <div class="history-actions">
        <button class="btn-edit" onclick="openEdit(${r.rowIndex}, '${r.date}', '${cat}', ${displayAmount}, '${memo}')">編集</button>
        <button class="btn-delete" onclick="deleteRecord(${r.rowIndex})">削除</button>
      </div>
    </div>`;
  }).join('');
}

function openEdit(rowIndex, date, category, amount, memo) {
  editingRowIndex = rowIndex;
  document.getElementById('editDate').value = date;
  document.getElementById('editCategory').value = category;
  document.getElementById('editAmount').value = amount;
  document.getElementById('editMemo').value = memo;
  document.getElementById('editModal').classList.add('show');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('show');
  editingRowIndex = null;
}

async function saveEdit() {
  if (!editingRowIndex) return;
  const dateStr  = document.getElementById('editDate').value;
  const category = document.getElementById('editCategory').value;
  const amount   = Number(document.getElementById('editAmount').value);
  const memo     = document.getElementById('editMemo').value;
  if (!dateStr || !category || amount <= 0) { alert('日付・カテゴリ・金額を正しく入力してください'); return; }

  await jsonp(GAS_URL + '?action=editRecord&rowIndex=' + editingRowIndex
    + '&dateStr=' + encodeURIComponent(dateStr)
    + '&category=' + encodeURIComponent(category)
    + '&amount=' + amount
    + '&memo=' + encodeURIComponent(memo));

  const idx = allData.findIndex(r => r.rowIndex === editingRowIndex);
  if (idx !== -1) allData[idx] = { ...allData[idx], date: dateStr, month: dateStr.slice(0, 7), category, amount, memo };

  closeModal();
  renderHistory();
  setupMonths();
  alert('✅ 保存しました！');
}

async function deleteRecord(rowIndex) {
  if (!confirm('この記録を削除しますか？')) return;
  await jsonp(GAS_URL + '?action=deleteRecord&rowIndex=' + rowIndex);
  allData = allData.filter(r => r.rowIndex !== rowIndex);
  renderHistory();
  setupMonths();
  alert('✅ 削除しました！');
}

loadData();
</script>
</body>
</html>
