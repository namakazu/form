<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>家計簿入力</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;margin:0;background:#f6f7f9}
    .wrap{max-width:560px;margin:0 auto;padding:16px}
    .card{background:#fff;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.06);padding:16px}
    h1{font-size:18px;margin:0 0 8px}
    .row{display:flex;gap:12px}
    .field{margin:12px 0;flex:1}
    label{display:block;font-size:12px;color:#666;margin-bottom:6px}
    input,select,textarea{width:100%;font-size:16px;padding:10px 12px;border:1px solid #ddd;border-radius:8px;background:#fff}
    button{width:100%;padding:12px 14px;border:none;border-radius:10px;font-size:16px;background:#2a73ff;color:#fff;cursor:pointer}
    button:disabled{opacity:.6;cursor:not-allowed}
    .hint{font-size:12px;color:#888;margin-top:4px}
    .ok{color:#0a7f3f}
    .err{color:#b00020}
  </style>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>家計簿入力</h1>
      <div class="row">
        <div class="field">
          <label>日付</label>
          <input type="date" id="date">
        </div>
        <div class="field">
          <label>金額（円）</label>
          <input type="number" id="amount" inputmode="numeric" placeholder="例: 600">
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>カテゴリ</label>
          <select id="category">
            <option>食費</option>
            <option>交通</option>
            <option>交際</option>
            <option>日用品</option>
            <option>娯楽</option>
            <option>その他</option>
          </select>
        </div>
        <div class="field">
          <label>サブカテゴリ（任意）</label>
          <input type="text" id="sub" placeholder="例: コンビニ / 外食 など">
        </div>
      </div>
      <div class="field">
        <label>メモ（任意）</label>
        <textarea id="memo" rows="2" placeholder="店名や用途など"></textarea>
        <div class="hint">※ 送信後はLINEで確認通知が届きます。</div>
      </div>
      <button id="submitBtn">送信する</button>
      <div id="msg" class="hint" style="margin-top:10px;"></div>
    </div>
  </div>

  <script>
    // ▼通常LIFFならIDを入れる。ミニアプリ運用のみなら空でOK。
    const LIFF_ID = '';

    async function init(){
      try{
        if (LIFF_ID) {
          await liff.init({ liffId: LIFF_ID });
          if (!liff.isLoggedIn()) liff.login();
        } else {
          try { await liff.init({}); } catch(e) { /* ミニアプリ以外では失敗する場合あり */ }
        }
      }catch(e){
        show('LIFF初期化に失敗: '+ e.message, true);
      }

      // 初期日付＝今日
      const t = new Date();
      const yyyy = t.getFullYear();
      const mm = ('0'+(t.getMonth()+1)).slice(-2);
      const dd = ('0'+t.getDate()).slice(-2);
      document.getElementById('date').value = `${yyyy}-${mm}-${dd}`;

      document.getElementById('submitBtn').addEventListener('click', onSubmit);
    }

    function show(text, isErr){
      const el = document.getElementById('msg');
      el.textContent = text || '';
      el.className = 'hint ' + (isErr? 'err' : 'ok');
    }

    async function onSubmit(){
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; show('送信中…');

      try{
        // userIdの取得（Profile → IDトークンの順でフォールバック）
        let uid = '';
        try { uid = (await liff.getProfile()).userId; } catch(e){}
        if (!uid) { try { uid = liff.getDecodedIDToken()?.sub || ''; } catch(e){} }
        if (!uid) throw new Error('ユーザーIDの取得に失敗しました（ミニアプリ権限: openid/profile を確認）');

        const dateStr = document.getElementById('date').value;
        const amount  = document.getElementById('amount').value;
        const category= document.getElementById('category').value;
        const sub     = document.getElementById('sub').value;
        const memo    = document.getElementById('memo').value;

        if(!amount || Number(amount) <= 0) throw new Error('金額を入力してください');

        google.script.run
          .withSuccessHandler(()=>{
            show('✅ 登録しました。数秒後にLINEに通知が届きます。');
            setTimeout(()=>{ try{ liff.closeWindow(); }catch(e){} }, 800);
          })
          .withFailureHandler(err=>{
            show('登録に失敗: ' + (err && err.message ? err.message : err), true);
            btn.disabled = false;
          })
          .formAdd({ uid, dateStr, amount, category, sub, memo });

      }catch(e){
        show(e.message || 'エラーが発生しました', true);
        btn.disabled = false;
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
